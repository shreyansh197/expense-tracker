<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background gradient: deep navy → vivid indigo → violet -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0a0f1e"/>
      <stop offset="45%"  stop-color="#1e1b6e"/>
      <stop offset="100%" stop-color="#2d1458"/>
    </linearGradient>

    <!-- Icon accent gradient: indigo → cyan -->
    <linearGradient id="accent" x1="120" y1="140" x2="392" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="50%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <!-- Stream gradient: cyan → indigo flowing left to right -->
    <linearGradient id="stream" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6366f1"/>
      <stop offset="50%"  stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>

    <!-- Gold coin flat face -->
    <linearGradient id="coinGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <!-- Raised edge highlight (top arc) -->
    <linearGradient id="coinEdgeLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>

    <!-- Glow filter for the E mark -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Soft inner glow on background -->
    <radialGradient id="centerGlow" cx="50%" cy="45%" r="45%">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip to rounded square for maskable icons -->
    <clipPath id="roundedSquare">
      <rect width="512" height="512" rx="115" ry="115"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="115" ry="115" fill="url(#bg)"/>

  <!-- Inner glow overlay -->
  <rect width="512" height="512" rx="115" ry="115" fill="url(#centerGlow)"/>

  <!-- Subtle grid texture -->
  <g opacity="0.06" clip-path="url(#roundedSquare)">
    <line x1="0" y1="128" x2="512" y2="128" stroke="white" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="white" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="white" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="white" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="white" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="white" stroke-width="1"/>
  </g>

  <!-- Flowing stream lines behind the E — bolder for visual impact -->
  <g opacity="0.35" clip-path="url(#roundedSquare)">
    <path
      d="M40,185 C130,160 200,210 290,185 S420,145 480,180"
      stroke="#22d3ee"
      stroke-width="8"
      stroke-linecap="round"
      fill="none"
    />
    <path
      d="M30,248 C120,225 190,275 280,248 S400,215 480,245"
      stroke="#818cf8"
      stroke-width="6"
      stroke-linecap="round"
      fill="none"
    />
    <path
      d="M40,315 C130,290 210,335 300,310 S425,278 480,308"
      stroke="#6366f1"
      stroke-width="5"
      stroke-linecap="round"
      fill="none"
    />
    <path
      d="M50,378 C140,358 215,395 305,372 S430,342 475,368"
      stroke="#22d3ee"
      stroke-width="4"
      stroke-linecap="round"
      fill="none"
    />
  </g>

  <!--
    ExpenStream "E" mark — modern curvy premium E.
    Smooth rounded paths for a contemporary app feel.
    Gold coin accent at top-right.
  -->
  <g filter="url(#glow)" transform="translate(218, 256)">

    <!-- Shadow / depth layer -->
    <g transform="translate(3, 5)" opacity="0.35">
      <path d="
        M-68,-110 C-82,-110 -90,-100 -90,-88 L-90,88 C-90,100 -82,110 -68,110
        L65,110 C78,110 82,100 82,94 C82,88 78,80 65,80 L-48,80 L-48,20
        L10,20 C23,20 27,10 27,4 C27,-2 23,-12 10,-12 L-48,-12 L-48,-78
        L65,-78 C78,-78 82,-88 82,-94 C82,-100 78,-110 65,-110 Z
      " fill="black"/>
      <path d="
        M65,110
        C90,110 120,100 120,72
        C120,44 96,34 72,26
        C48,18 32,8 32,-14
        C32,-36 50,-48 72,-48
        C88,-48 100,-40 108,-32
        L120,-46
        C110,-56 94,-64 72,-64
        C42,-64 16,-48 16,-18
        C16,10 38,22 62,30
        C86,38 104,48 104,74
        C104,94 88,96 65,96 L-48,96 L-48,80 L65,80
        C78,80 82,88 82,94 C82,100 78,110 65,110 Z
      " fill="black"/>
    </g>

    <!-- Main E — modern curvy with rounded terminals -->
    <path d="
      M-68,-110
      C-82,-110 -90,-100 -90,-88
      L-90,88
      C-90,100 -82,110 -68,110
      L65,110
      C78,110 82,100 82,94
      C82,88 78,80 65,80
      L-48,80
      L-48,20
      L10,20
      C23,20 27,10 27,4
      C27,-2 23,-12 10,-12
      L-48,-12
      L-48,-78
      L65,-78
      C78,-78 82,-88 82,-94
      C82,-100 78,-110 65,-110
      Z
    " fill="url(#accent)"/>

    <!--
      S flows from E's bottom bar — the bottom bar extends right
      and smoothly curves up into S's lower bulge, then snakes
      into the upper bulge. One seamless stroke-based S.
    -->

    <!-- S lower curve: continues from E bottom bar end -->
    <path d="
      M65,95
      C105,95 150,81 150,54
      C150,28 122,18 96,10
      C70,2 55,-8 55,-28
      C55,-46 74,-56 98,-56
      C116,-56 130,-48 140,-38
    " fill="none" stroke="url(#accent)" stroke-width="30" stroke-linecap="round"/>

    <!-- S glass highlight on top curve -->
    <path d="
      M140,-38 C130,-48 116,-56 98,-56 C74,-56 55,-46 55,-28
    " fill="none" stroke="white" stroke-width="28" stroke-linecap="round" opacity="0.06"/>


    <!-- S edge highlight -->
    

  </g>

  <!-- Finance icons scattered randomly across the canvas -->
  <g opacity="0.45" clip-path="url(#roundedSquare)">

    <!-- Bar chart -->
    <g transform="translate(78, 102)">
      <rect x="0" y="8" width="5" height="12" rx="1.5" fill="#818cf8"/>
      <rect x="7" y="3" width="5" height="17" rx="1.5" fill="#a5b4fc"/>
      <rect x="14" y="-2" width="5" height="22" rx="1.5" fill="#6366f1"/>
    </g>

    <!-- Pie/donut -->
    <g transform="translate(427, 88)">
      <circle cx="0" cy="0" r="10" fill="none" stroke="#818cf8" stroke-width="3.5" stroke-dasharray="20 43" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="10" fill="none" stroke="#22d3ee" stroke-width="3.5" stroke-dasharray="14 49" stroke-dashoffset="-20" stroke-linecap="round"/>
    </g>

    <!-- Wallet -->
    <g transform="translate(438, 420)">
      <rect x="-12" y="-8" width="24" height="16" rx="3" fill="none" stroke="#a5b4fc" stroke-width="2.5"/>
      <circle cx="8" cy="0" r="2.5" fill="#22d3ee"/>
      <line x1="-12" y1="-3" x2="-4" y2="-3" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Bank building -->
    <g transform="translate(72, 412)">
      <polygon points="0,-11 12,-4 -12,-4" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linejoin="round"/>
      <line x1="-10" y1="9" x2="10" y2="9" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-6" y1="-3" x2="-6" y2="8" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="0" y1="-3" x2="0" y2="8" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="6" y1="-3" x2="6" y2="8" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round"/>
    </g>

    <!-- Percentage -->
    <g transform="translate(182, 78)">
      <circle cx="-4" cy="-4" r="2" fill="#818cf8"/>
      <circle cx="4" cy="4" r="2" fill="#818cf8"/>
      <line x1="-5" y1="5" x2="5" y2="-5" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Calculator -->
    <g transform="translate(345, 435)">
      <rect x="-9" y="-11" width="18" height="22" rx="2.5" fill="none" stroke="#a5b4fc" stroke-width="2"/>
      <line x1="-5" y1="-5" x2="5" y2="-5" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
      <circle cx="-4" cy="1" r="1.5" fill="#22d3ee"/>
      <circle cx="0" cy="1" r="1.5" fill="#22d3ee"/>
      <circle cx="4" cy="1" r="1.5" fill="#22d3ee"/>
      <circle cx="-4" cy="6" r="1.5" fill="#818cf8"/>
      <circle cx="0" cy="6" r="1.5" fill="#818cf8"/>
      <circle cx="4" cy="6" r="1.5" fill="#818cf8"/>
    </g>

    <!-- Credit card -->
    <g transform="translate(93, 298)">
      <rect x="-14" y="-9" width="28" height="18" rx="3" fill="none" stroke="#6366f1" stroke-width="2"/>
      <line x1="-14" y1="-3" x2="14" y2="-3" stroke="#818cf8" stroke-width="2.5"/>
      <line x1="-10" y1="3" x2="-2" y2="3" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
      <circle cx="10" cy="3" r="2" fill="#a5b4fc"/>
    </g>

    <!-- Line chart -->
    <g transform="translate(420, 310)">
      <polyline points="-12,6 -4,0 4,4 12,-6" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="12" cy="-6" r="2.5" fill="#22d3ee"/>
    </g>

    <!-- Money bag -->
    <g transform="translate(55, 195)">
      <path d="M-7,2 C-7,-4 -3,-7 0,-7 C3,-7 7,-4 7,2 C7,8 3,10 0,10 C-3,10 -7,8 -7,2 Z" fill="none" stroke="#a5b4fc" stroke-width="2"/>
      <path d="M-3,-7 C-2,-10 2,-10 3,-7" fill="none" stroke="#a5b4fc" stroke-width="1.8" stroke-linecap="round"/>
      <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="10" font-weight="bold" fill="#a5b4fc">$</text>
    </g>

    <!-- Receipt -->
    <g transform="translate(456, 248)">
      <path d="M-8,-11 L8,-11 L8,11 L5,9 L2,11 L-1,9 L-4,11 L-8,9 Z" fill="none" stroke="#818cf8" stroke-width="2" stroke-linejoin="round"/>
      <line x1="-4" y1="-6" x2="4" y2="-6" stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-4" y1="-2" x2="4" y2="-2" stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-4" y1="2" x2="2" y2="2" stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- Exchange arrows -->
    <g transform="translate(52, 340)">
      <line x1="-8" y1="-3" x2="8" y2="-3" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
      <polyline points="4,-7 8,-3 4,1" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="8" y1="3" x2="-8" y2="3" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
      <polyline points="-4,-1 -8,3 -4,7" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Target / bullseye -->
    <g transform="translate(448, 168)">
      <circle cx="0" cy="0" r="9" fill="none" stroke="#6366f1" stroke-width="2"/>
      <circle cx="0" cy="0" r="5" fill="none" stroke="#818cf8" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="2" fill="#22d3ee"/>
    </g>

    <!-- Stack of coins -->
    <g transform="translate(160, 435)">
      <ellipse cx="0" cy="5" rx="8" ry="3" fill="none" stroke="#fbbf24" stroke-width="1.8" opacity="0.7"/>
      <ellipse cx="0" cy="1" rx="8" ry="3" fill="none" stroke="#fbbf24" stroke-width="1.8" opacity="0.7"/>
      <ellipse cx="0" cy="-3" rx="8" ry="3" fill="none" stroke="#fbbf24" stroke-width="1.8"/>
    </g>

    <!-- Clock -->
    <g transform="translate(290, 58)">
      <circle cx="0" cy="0" r="10" fill="none" stroke="#818cf8" stroke-width="2"/>
      <line x1="0" y1="0" x2="0" y2="-6" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="4" y2="2" stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="1" fill="#22d3ee"/>
    </g>

    <!-- Diamond / gem -->
    <g transform="translate(395, 152)">
      <polygon points="0,-8 10,-2 6,8 -6,8 -10,-2" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linejoin="round"/>
      <line x1="-10" y1="-2" x2="10" y2="-2" stroke="#a78bfa" stroke-width="1.5"/>
      <line x1="0" y1="-8" x2="-3" y2="-2" stroke="#a78bfa" stroke-width="1.2"/>
      <line x1="0" y1="-8" x2="3" y2="-2" stroke="#a78bfa" stroke-width="1.2"/>
    </g>

    <!-- Upward arrow -->
    <g transform="translate(73, 158)">
      <polyline points="-6,6 0,-6 6,6" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="0" y1="-6" x2="0" y2="10" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- Piggy bank -->
    <g transform="translate(437, 355)">
      <ellipse cx="0" cy="0" rx="11" ry="9" fill="none" stroke="#a5b4fc" stroke-width="2"/>
      <circle cx="-5" cy="-3" r="1.5" fill="#818cf8"/>
      <line x1="5" y1="-6" x2="8" y2="-10" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round"/>
      <line x1="-4" y1="9" x2="-4" y2="13" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
      <line x1="4" y1="9" x2="4" y2="13" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Shield / security -->
    <g transform="translate(60, 452)">
      <path d="M0,-10 L8,-6 L8,3 C8,8 0,12 0,12 C0,12 -8,8 -8,3 L-8,-6 Z" fill="none" stroke="#6366f1" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="0" cy="1" r="2.5" fill="#818cf8"/>
      <line x1="0" y1="3" x2="0" y2="6" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Dollar sign -->
    <g transform="translate(330, 78)">
      <text x="0" y="6" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="700" fill="#22d3ee">$</text>
    </g>

    <!-- Candlestick chart -->
    <g transform="translate(455, 452)">
      <line x1="-6" y1="-8" x2="-6" y2="8" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round"/>
      <rect x="-9" y="-4" width="6" height="8" rx="1" fill="#818cf8"/>
      <line x1="6" y1="-10" x2="6" y2="6" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round"/>
      <rect x="3" y="-6" width="6" height="8" rx="1" fill="#22d3ee"/>
    </g>

    <!-- Hourglass -->
    <g transform="translate(115, 72)">
      <line x1="-6" y1="-9" x2="6" y2="-9" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round"/>
      <line x1="-6" y1="9" x2="6" y2="9" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round"/>
      <path d="M-5,-9 L0,0 L5,-9" fill="none" stroke="#a5b4fc" stroke-width="1.8" stroke-linejoin="round"/>
      <path d="M-5,9 L0,0 L5,9" fill="none" stroke="#a5b4fc" stroke-width="1.8" stroke-linejoin="round"/>
    </g>

    <!-- Tag / label -->
    <g transform="translate(92, 370)">
      <path d="M-8,-7 L4,-7 L10,0 L4,7 L-8,7 Z" fill="none" stroke="#818cf8" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="-3" cy="0" r="2" fill="#22d3ee"/>
    </g>

    <!-- Trend line up -->
    <g transform="translate(245, 448)">
      <polyline points="-12,8 -4,2 4,5 12,-8" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="6,-8 12,-8 12,-2" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Coin -->
    <g transform="translate(162, 152)">
      <circle cx="0" cy="0" r="8" fill="url(#coinGold)" stroke="#fbbf24" stroke-width="2"/>
      <circle cx="0" cy="0" r="5" fill="none" stroke="#fde68a" stroke-width="1.2" opacity="0.6"/>
    </g>

    <!-- Graph bars small -->
    <g transform="translate(415, 68)">
      <rect x="-8" y="4" width="4" height="8" rx="1" fill="#6366f1"/>
      <rect x="-2" y="-2" width="4" height="14" rx="1" fill="#818cf8"/>
      <rect x="4" y="-6" width="4" height="18" rx="1" fill="#22d3ee"/>
    </g>

    <!-- Lightning bolt -->
    <g transform="translate(53, 265)">
      <polyline points="2,-10 -4,0 2,0 -2,10" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Briefcase -->
    <g transform="translate(430, 440)">
      <rect x="-10" y="-6" width="20" height="14" rx="2" fill="none" stroke="#818cf8" stroke-width="2"/>
      <path d="M-4,-6 L-4,-9 C-4,-10 -3,-11 -2,-11 L2,-11 C3,-11 4,-10 4,-9 L4,-6" fill="none" stroke="#818cf8" stroke-width="1.8"/>
    </g>

    <!-- Savings jar -->
    <g transform="translate(267, 452)">
      <rect x="-7" y="-4" width="14" height="12" rx="3" fill="none" stroke="#a5b4fc" stroke-width="2"/>
      <line x1="-4" y1="-4" x2="-4" y2="-7" stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="4" y1="-4" x2="4" y2="-7" stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-4" y1="-7" x2="4" y2="-7" stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round"/>
    </g>

  </g>
</svg>
