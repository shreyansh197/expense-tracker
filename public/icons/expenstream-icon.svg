<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background gradient: deep navy → vivid indigo → violet -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0a0f1e"/>
      <stop offset="45%"  stop-color="#1e1b6e"/>
      <stop offset="100%" stop-color="#2d1458"/>
    </linearGradient>

    <!-- Icon accent gradient: indigo → cyan -->
    <linearGradient id="accent" x1="120" y1="140" x2="392" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="50%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <!-- Stream gradient: cyan → indigo flowing left to right -->
    <linearGradient id="stream" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6366f1"/>
      <stop offset="50%"  stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>

    <!-- Gold coin flat face -->
    <linearGradient id="coinGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <!-- Raised edge highlight (top arc) -->
    <linearGradient id="coinEdgeLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>

    <!-- Glow filter for the E mark -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Soft inner glow on background -->
    <radialGradient id="centerGlow" cx="50%" cy="45%" r="45%">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip to rounded square for maskable icons -->
    <clipPath id="roundedSquare">
      <rect width="512" height="512" rx="115" ry="115"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="115" ry="115" fill="url(#bg)"/>

  <!-- Inner glow overlay -->
  <rect width="512" height="512" rx="115" ry="115" fill="url(#centerGlow)"/>

  <!-- Subtle grid texture -->
  <g opacity="0.06" clip-path="url(#roundedSquare)">
    <line x1="0" y1="128" x2="512" y2="128" stroke="white" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="white" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="white" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="white" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="white" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="white" stroke-width="1"/>
  </g>

  <!-- Flowing stream lines behind the E — bolder for visual impact -->
  <g opacity="0.35" clip-path="url(#roundedSquare)">
    <path
      d="M40,185 C130,160 200,210 290,185 S420,145 480,180"
      stroke="#22d3ee"
      stroke-width="18"
      stroke-linecap="round"
      fill="none"
    />
    <path
      d="M30,248 C120,225 190,275 280,248 S400,215 480,245"
      stroke="#818cf8"
      stroke-width="15"
      stroke-linecap="round"
      fill="none"
    />
    <path
      d="M40,315 C130,290 210,335 300,310 S425,278 480,308"
      stroke="#6366f1"
      stroke-width="12"
      stroke-linecap="round"
      fill="none"
    />
    <path
      d="M50,378 C140,358 215,395 305,372 S430,342 475,368"
      stroke="#22d3ee"
      stroke-width="10"
      stroke-linecap="round"
      fill="none"
    />
  </g>

  <!--
    ExpenStream "E" mark — modern curvy premium E.
    Smooth rounded paths for a contemporary app feel.
    Gold coin accent at top-right.
  -->
  <g filter="url(#glow)" transform="translate(256, 256)">

    <!-- Shadow / depth layer -->
    <g transform="translate(3, 5)" opacity="0.35">
      <path d="M-80,-115 C-80,-115 -90,-110 -90,-95 L-90,95 C-90,110 -80,115 -68,115 L65,115 C75,115 80,108 80,100 C80,92 75,85 65,85 L-48,85 L-48,22 L45,22 C55,22 60,15 60,7 C60,-1 55,-8 45,-8 L-48,-8 L-48,-80 L65,-80 C75,-80 80,-87 80,-95 C80,-103 75,-110 65,-110 L-68,-110 C-80,-110 -80,-115 -80,-115 Z" fill="black"/>
    </g>

    <!-- Main E — modern curvy with rounded terminals -->
    <path d="
      M-68,-110
      C-82,-110 -90,-100 -90,-88
      L-90,88
      C-90,100 -82,110 -68,110
      L65,110
      C78,110 82,100 82,94
      C82,88 78,80 65,80
      L-48,80
      L-48,20
      L45,20
      C58,20 62,10 62,4
      C62,-2 58,-12 45,-12
      L-48,-12
      L-48,-78
      L65,-78
      C78,-78 82,-88 82,-94
      C82,-100 78,-110 65,-110
      Z
    " fill="url(#accent)"/>

    <!-- Inner highlight stroke for premium depth -->
    <path d="
      M-68,-110
      C-82,-110 -90,-100 -90,-88
      L-90,88
      C-90,100 -82,110 -68,110
      L65,110
      C78,110 82,100 82,94
      C82,88 78,80 65,80
      L-48,80
      L-48,20
      L45,20
      C58,20 62,10 62,4
      C62,-2 58,-12 45,-12
      L-48,-12
      L-48,-78
      L65,-78
      C78,-78 82,-88 82,-94
      C82,-100 78,-110 65,-110
      Z
    " fill="none" stroke="white" stroke-width="1.5" opacity="0.12"/>


  </g>

  <!-- "S" beside the E — filled block letter matching E's curvy style -->
  <g filter="url(#glow)" transform="translate(370, 305)">
    <!-- S shadow / depth layer -->
    <g transform="translate(3, 5)" opacity="0.35">
      <path d="
        M24,-52
        C10,-58 -10,-56 -22,-46
        C-36,-34 -36,-14 -18,-4
        C-4,4 16,10 28,22
        C40,34 38,52 22,58
        C8,64 -12,60 -24,50
        L-16,38
        C-6,44 8,48 18,44
        C30,38 30,26 18,18
        C6,10 -16,4 -26,-10
        C-36,-24 -32,-42 -18,-50
        C-4,-56 14,-54 24,-46
        Z
      " fill="black"/>
    </g>

    <!-- S main filled body — curvy block letter -->
    <path d="
      M24,-52
      C10,-58 -10,-56 -22,-46
      C-36,-34 -36,-14 -18,-4
      C-4,4 16,10 28,22
      C40,34 38,52 22,58
      C8,64 -12,60 -24,50
      L-16,38
      C-6,44 8,48 18,44
      C30,38 30,26 18,18
      C6,10 -16,4 -26,-10
      C-36,-24 -32,-42 -18,-50
      C-4,-56 14,-54 24,-46
      Z
    " fill="url(#accent)"/>

    <!-- Inner highlight stroke for premium depth (matching E) -->
    <path d="
      M24,-52
      C10,-58 -10,-56 -22,-46
      C-36,-34 -36,-14 -18,-4
      C-4,4 16,10 28,22
      C40,34 38,52 22,58
      C8,64 -12,60 -24,50
      L-16,38
      C-6,44 8,48 18,44
      C30,38 30,26 18,18
      C6,10 -16,4 -26,-10
      C-36,-24 -32,-42 -18,-50
      C-4,-56 14,-54 24,-46
      Z
    " fill="none" stroke="white" stroke-width="1.5" opacity="0.12"/>
  </g>

  <!-- Small finance icons scattered across the canvas -->
  <g opacity="0.55" clip-path="url(#roundedSquare)">

    <!-- Mini bar chart — bottom-left corner -->
    <g transform="translate(62, 442)">
      <rect x="0" y="8" width="5" height="12" rx="1.5" fill="#818cf8"/>
      <rect x="7" y="3" width="5" height="17" rx="1.5" fill="#a5b4fc"/>
      <rect x="14" y="-2" width="5" height="22" rx="1.5" fill="#6366f1"/>
    </g>

    <!-- Mini pie/donut — top-left corner -->
    <g transform="translate(58, 90)">
      <circle cx="0" cy="0" r="10" fill="none" stroke="#818cf8" stroke-width="3.5" stroke-dasharray="20 43" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="10" fill="none" stroke="#22d3ee" stroke-width="3.5" stroke-dasharray="14 49" stroke-dashoffset="-20" stroke-linecap="round"/>
    </g>

    <!-- Mini wallet outline — bottom-right corner -->
    <g transform="translate(452, 442)">
      <rect x="-12" y="-8" width="24" height="16" rx="3" fill="none" stroke="#a5b4fc" stroke-width="2.5"/>
      <circle cx="8" cy="0" r="2.5" fill="#22d3ee"/>
      <line x1="-12" y1="-3" x2="-4" y2="-3" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Mini bank building — far right upper -->
    <g transform="translate(456, 175)">
      <polygon points="0,-11 12,-4 -12,-4" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linejoin="round"/>
      <line x1="-10" y1="9" x2="10" y2="9" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-6" y1="-3" x2="-6" y2="8" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="0" y1="-3" x2="0" y2="8" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="6" y1="-3" x2="6" y2="8" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round"/>
    </g>

    <!-- Mini percentage badge — far left center -->
    <g transform="translate(50, 250)">
      <circle cx="-4" cy="-4" r="2" fill="#818cf8"/>
      <circle cx="4" cy="4" r="2" fill="#818cf8"/>
      <line x1="-5" y1="5" x2="5" y2="-5" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Mini calculator — top center-right -->
    <g transform="translate(310, 48)">
      <rect x="-9" y="-11" width="18" height="22" rx="2.5" fill="none" stroke="#a5b4fc" stroke-width="2"/>
      <line x1="-5" y1="-5" x2="5" y2="-5" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
      <circle cx="-4" cy="1" r="1.5" fill="#22d3ee"/>
      <circle cx="0" cy="1" r="1.5" fill="#22d3ee"/>
      <circle cx="4" cy="1" r="1.5" fill="#22d3ee"/>
      <circle cx="-4" cy="6" r="1.5" fill="#818cf8"/>
      <circle cx="0" cy="6" r="1.5" fill="#818cf8"/>
      <circle cx="4" cy="6" r="1.5" fill="#818cf8"/>
    </g>

    <!-- Mini credit card — bottom center -->
    <g transform="translate(256, 462)">
      <rect x="-14" y="-9" width="28" height="18" rx="3" fill="none" stroke="#6366f1" stroke-width="2"/>
      <line x1="-14" y1="-3" x2="14" y2="-3" stroke="#818cf8" stroke-width="2.5"/>
      <line x1="-10" y1="3" x2="-2" y2="3" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
      <circle cx="10" cy="3" r="2" fill="#a5b4fc"/>
    </g>

    <!-- Mini line chart — top left area -->
    <g transform="translate(155, 48)">
      <polyline points="-12,6 -4,0 4,4 12,-6" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="12" cy="-6" r="2.5" fill="#22d3ee"/>
    </g>

    <!-- Mini money bag — left side below center -->
    <g transform="translate(55, 365)">
      <path d="M-7,2 C-7,-4 -3,-7 0,-7 C3,-7 7,-4 7,2 C7,8 3,10 0,10 C-3,10 -7,8 -7,2 Z" fill="none" stroke="#a5b4fc" stroke-width="2"/>
      <path d="M-3,-7 C-2,-10 2,-10 3,-7" fill="none" stroke="#a5b4fc" stroke-width="1.8" stroke-linecap="round"/>
      <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="10" font-weight="bold" fill="#a5b4fc">$</text>
    </g>

    <!-- Mini receipt — right side center -->
    <g transform="translate(458, 310)">
      <path d="M-8,-11 L8,-11 L8,11 L5,9 L2,11 L-1,9 L-4,11 L-8,9 Z" fill="none" stroke="#818cf8" stroke-width="2" stroke-linejoin="round"/>
      <line x1="-4" y1="-6" x2="4" y2="-6" stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-4" y1="-2" x2="4" y2="-2" stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-4" y1="2" x2="2" y2="2" stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- Mini exchange arrows — top right area -->
    <g transform="translate(435, 70)">
      <line x1="-8" y1="-3" x2="8" y2="-3" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
      <polyline points="4,-7 8,-3 4,1" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="8" y1="3" x2="-8" y2="3" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
      <polyline points="-4,-1 -8,3 -4,7" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Mini target / bullseye — left side upper -->
    <g transform="translate(52, 170)">
      <circle cx="0" cy="0" r="9" fill="none" stroke="#6366f1" stroke-width="2"/>
      <circle cx="0" cy="0" r="5" fill="none" stroke="#818cf8" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="2" fill="#22d3ee"/>
    </g>

    <!-- Mini stack of coins — bottom left mid -->
    <g transform="translate(115, 462)">
      <ellipse cx="0" cy="5" rx="8" ry="3" fill="none" stroke="#fbbf24" stroke-width="1.8" opacity="0.7"/>
      <ellipse cx="0" cy="1" rx="8" ry="3" fill="none" stroke="#fbbf24" stroke-width="1.8" opacity="0.7"/>
      <ellipse cx="0" cy="-3" rx="8" ry="3" fill="none" stroke="#fbbf24" stroke-width="1.8"/>
    </g>

    <!-- Mini clock — top center -->
    <g transform="translate(210, 52)">
      <circle cx="0" cy="0" r="10" fill="none" stroke="#818cf8" stroke-width="2"/>
      <line x1="0" y1="0" x2="0" y2="-6" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="4" y2="2" stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="1" fill="#22d3ee"/>
    </g>
  </g>
</svg>
