<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background gradient: deep navy → vivid indigo → violet -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0a0f1e"/>
      <stop offset="45%"  stop-color="#1e1b6e"/>
      <stop offset="100%" stop-color="#2d1458"/>
    </linearGradient>

    <!-- Icon accent gradient: indigo → cyan -->
    <linearGradient id="accent" x1="120" y1="140" x2="392" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="50%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <!-- Coin gradient: golden -->
    <linearGradient id="coinGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <!-- Glow filter for the S mark -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Coin glow -->
    <filter id="coinGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Soft inner glow on background -->
    <radialGradient id="centerGlow" cx="50%" cy="45%" r="45%">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip to rounded square for maskable icons -->
    <clipPath id="roundedSquare">
      <rect width="512" height="512" rx="115" ry="115"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="115" ry="115" fill="url(#bg)"/>

  <!-- Inner glow overlay -->
  <rect width="512" height="512" rx="115" ry="115" fill="url(#centerGlow)"/>

  <!-- Subtle grid texture -->
  <g opacity="0.06" clip-path="url(#roundedSquare)">
    <line x1="0" y1="128" x2="512" y2="128" stroke="white" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="white" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="white" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="white" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="white" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="white" stroke-width="1"/>
  </g>

  <!-- Upward trend line — visible behind the S to convey tracking/growth -->
  <g opacity="0.35" clip-path="url(#roundedSquare)">
    <polyline
      points="90,400 170,340 250,360 330,280 410,220"
      stroke="#22d3ee"
      stroke-width="14"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
    <polyline
      points="385,230 410,220 400,245"
      stroke="#22d3ee"
      stroke-width="14"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
  </g>

  <!--
    Spendly "S" mark — premium geometric S with small finance icons.
  -->
  <g filter="url(#glow)" transform="translate(252,258)">

    <!-- Shadow / depth layer -->
    <path
      d="
        M  52,-100
        C  52,-100  52,-145  0,-145
        C -52,-145 -80,-118 -80,-76
        C -80,-34  -48, -8   0,  6
        C  48, 20  80, 44  80, 86
        C  80,128  52,152   0,152
        C -52,152 -52,118 -52,118
      "
      stroke="rgba(0,0,0,0.45)"
      stroke-width="52"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
      transform="translate(3,6)"
    />

    <!-- Main S stroke — geometric, symmetrical, premium -->
    <path
      d="
        M  52,-100
        C  52,-100  52,-145  0,-145
        C -52,-145 -80,-118 -80,-76
        C -80,-34  -48, -8   0,  6
        C  48, 20  80, 44  80, 86
        C  80,128  52,152   0,152
        C -52,152 -52,118 -52,118
      "
      stroke="url(#accent)"
      stroke-width="50"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />

    <!-- Coin dot accent — top right of S -->
    <circle cx="52" cy="-100" r="14" fill="#fbbf24" opacity="0.9"/>
  </g>

  <!-- Small finance icons scattered across the canvas -->
  <g opacity="0.55" clip-path="url(#roundedSquare)">

    <!-- Mini bar chart — bottom-left corner -->
    <g transform="translate(62, 442)">
      <rect x="0" y="8" width="5" height="12" rx="1.5" fill="#818cf8"/>
      <rect x="7" y="3" width="5" height="17" rx="1.5" fill="#a5b4fc"/>
      <rect x="14" y="-2" width="5" height="22" rx="1.5" fill="#6366f1"/>
    </g>

    <!-- Mini pie/donut — top-left corner -->
    <g transform="translate(58, 90)">
      <circle cx="0" cy="0" r="10" fill="none" stroke="#818cf8" stroke-width="3.5" stroke-dasharray="20 43" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="10" fill="none" stroke="#22d3ee" stroke-width="3.5" stroke-dasharray="14 49" stroke-dashoffset="-20" stroke-linecap="round"/>
    </g>

    <!-- Mini wallet outline — bottom-right corner -->
    <g transform="translate(452, 442)">
      <rect x="-12" y="-8" width="24" height="16" rx="3" fill="none" stroke="#a5b4fc" stroke-width="2.5"/>
      <circle cx="8" cy="0" r="2.5" fill="#22d3ee"/>
      <line x1="-12" y1="-3" x2="-4" y2="-3" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Mini upward arrow — far right upper -->
    <g transform="translate(456, 175)">
      <polyline points="-8,8 0,-6 8,8" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="0" y1="-6" x2="0" y2="12" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- Mini percentage badge — far left center -->
    <g transform="translate(50, 250)">
      <circle cx="-4" cy="-4" r="2" fill="#818cf8"/>
      <circle cx="4" cy="4" r="2" fill="#818cf8"/>
      <line x1="-5" y1="5" x2="5" y2="-5" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Mini calculator — top center-right -->
    <g transform="translate(310, 48)">
      <rect x="-9" y="-11" width="18" height="22" rx="2.5" fill="none" stroke="#a5b4fc" stroke-width="2"/>
      <line x1="-5" y1="-5" x2="5" y2="-5" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
      <circle cx="-4" cy="1" r="1.5" fill="#22d3ee"/>
      <circle cx="0" cy="1" r="1.5" fill="#22d3ee"/>
      <circle cx="4" cy="1" r="1.5" fill="#22d3ee"/>
      <circle cx="-4" cy="6" r="1.5" fill="#818cf8"/>
      <circle cx="0" cy="6" r="1.5" fill="#818cf8"/>
      <circle cx="4" cy="6" r="1.5" fill="#818cf8"/>
    </g>

    <!-- Mini credit card — bottom center -->
    <g transform="translate(256, 462)">
      <rect x="-14" y="-9" width="28" height="18" rx="3" fill="none" stroke="#6366f1" stroke-width="2"/>
      <line x1="-14" y1="-3" x2="14" y2="-3" stroke="#818cf8" stroke-width="2.5"/>
      <line x1="-10" y1="3" x2="-2" y2="3" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
      <circle cx="10" cy="3" r="2" fill="#a5b4fc"/>
    </g>

    <!-- Mini piggy bank — far right lower -->
    <g transform="translate(456, 355)">
      <ellipse cx="0" cy="0" rx="11" ry="9" fill="none" stroke="#a5b4fc" stroke-width="2"/>
      <circle cx="-5" cy="-3" r="1.5" fill="#818cf8"/>
      <line x1="5" y1="-6" x2="8" y2="-10" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round"/>
      <line x1="-4" y1="9" x2="-4" y2="13" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
      <line x1="4" y1="9" x2="4" y2="13" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Mini line chart — top left area -->
    <g transform="translate(155, 48)">
      <polyline points="-12,6 -4,0 4,4 12,-6" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="12" cy="-6" r="2.5" fill="#22d3ee"/>
    </g>

    <!-- Mini shield/lock — far left lower -->
    <g transform="translate(50, 385)">
      <path d="M0,-10 L8,-6 L8,3 C8,8 0,12 0,12 C0,12 -8,8 -8,3 L-8,-6 Z" fill="none" stroke="#6366f1" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="0" cy="1" r="2.5" fill="#818cf8"/>
      <line x1="0" y1="3" x2="0" y2="6" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Mini receipt — bottom right area -->
    <g transform="translate(390, 455)">
      <path d="M-7,-12 L7,-12 L7,10 L4,8 L1,10 L-2,8 L-5,10 L-7,8 Z" fill="none" stroke="#a5b4fc" stroke-width="2" stroke-linejoin="round"/>
      <line x1="-3" y1="-6" x2="4" y2="-6" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-3" y1="-1" x2="4" y2="-1" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-3" y1="4" x2="2" y2="4" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- Mini target/bullseye — far right center -->
    <g transform="translate(456, 270)">
      <circle cx="0" cy="0" r="9" fill="none" stroke="#6366f1" stroke-width="2"/>
      <circle cx="0" cy="0" r="5" fill="none" stroke="#818cf8" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="2" fill="#22d3ee"/>
    </g>

  </g>

  <!-- Coin element — top right corner, universal design -->
  <g filter="url(#coinGlow)" transform="translate(370, 115)">
    <circle cx="0" cy="0" r="42" fill="url(#coinGrad)"/>
    <circle cx="0" cy="0" r="33" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.5"/>
    <!-- Inner concentric ring for coin authenticity -->
    <circle cx="0" cy="0" r="24" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="2"/>
    <!-- Coin shine highlight -->
    <ellipse cx="-12" cy="-14" rx="10" ry="16" fill="rgba(255,255,255,0.2)" transform="rotate(-30, -12, -14)"/>
    <!-- Three horizontal ridges — universal coin texture -->
    <line x1="-14" y1="-4" x2="14" y2="-4" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-16" y1="2" x2="16" y2="2" stroke="rgba(255,255,255,0.45)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-14" y1="8" x2="14" y2="8" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Small sparkle dots — activity feel -->
  <circle cx="340" cy="82" r="4" fill="#fcd34d" opacity="0.6"/>
  <circle cx="405" cy="95" r="3" fill="#f59e0b" opacity="0.5"/>
  <circle cx="320" cy="105" r="2.5" fill="#fbbf24" opacity="0.4"/>

  <!-- Subtle border ring -->
  <rect
    width="512" height="512" rx="115" ry="115"
    fill="none"
    stroke="rgba(255,255,255,0.08)"
    stroke-width="2"
  />
</svg>
