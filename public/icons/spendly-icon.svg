<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background gradient: deep navy → vivid indigo → violet -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0a0f1e"/>
      <stop offset="45%"  stop-color="#1e1b6e"/>
      <stop offset="100%" stop-color="#2d1458"/>
    </linearGradient>

    <!-- Icon accent gradient: indigo → cyan -->
    <linearGradient id="accent" x1="120" y1="140" x2="392" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="50%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <!-- Coin gradient: golden -->
    <linearGradient id="coinGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <!-- Glow filter for the S mark -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Coin glow -->
    <filter id="coinGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Soft inner glow on background -->
    <radialGradient id="centerGlow" cx="50%" cy="45%" r="45%">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip to rounded square for maskable icons -->
    <clipPath id="roundedSquare">
      <rect width="512" height="512" rx="115" ry="115"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="115" ry="115" fill="url(#bg)"/>

  <!-- Inner glow overlay -->
  <rect width="512" height="512" rx="115" ry="115" fill="url(#centerGlow)"/>

  <!-- Subtle grid texture -->
  <g opacity="0.06" clip-path="url(#roundedSquare)">
    <line x1="0" y1="128" x2="512" y2="128" stroke="white" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="white" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="white" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="white" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="white" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="white" stroke-width="1"/>
  </g>

  <!-- Upward trend line — subtle behind the S to convey tracking/growth -->
  <g opacity="0.12" clip-path="url(#roundedSquare)">
    <polyline
      points="90,400 170,340 250,360 330,280 410,220"
      stroke="#22d3ee"
      stroke-width="4"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
    <polyline
      points="385,230 410,220 400,245"
      stroke="#22d3ee"
      stroke-width="4"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
  </g>

  <!--
    Spendly "$" mark — the bold S with a vertical strike-through line,
    turning it into a currency/finance symbol. Combined with a ₹ coin accent
    to clearly communicate "expense tracking / money".
  -->
  <g filter="url(#glow)" transform="translate(256,256)">

    <!-- Shadow / depth layer (slightly offset, lower opacity) -->
    <path
      d="
        M  62,-110
        C  62,-110  62,-155 18,-155
        C -26,-155 -78,-130 -78,-72
        C -78,-18  -28,  8  22, 24
        C  70, 40 100, 62 100,118
        C 100,172  52,162   8,162
        C -36,162 -68,138 -68,138
      "
      stroke="rgba(0,0,0,0.35)"
      stroke-width="46"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
      transform="translate(3,6)"
    />

    <!-- Main S stroke -->
    <path
      d="
        M  62,-110
        C  62,-110  62,-155 18,-155
        C -26,-155 -78,-130 -78,-72
        C -78,-18  -28,  8  22, 24
        C  70, 40 100, 62 100,118
        C 100,172  52,162   8,162
        C -36,162 -68,138 -68,138
      "
      stroke="url(#accent)"
      stroke-width="44"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />

    <!-- Vertical strike-through — turns S into $ currency symbol -->
    <line x1="-4" y1="-170" x2="-4" y2="178" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" opacity="0.85"/>

    <!-- Coin dot accent — top right of S -->
    <circle cx="62" cy="-110" r="14" fill="#fbbf24" opacity="0.9"/>
    <!-- Bottom left end dot -->
    <circle cx="-68" cy="138" r="14" fill="#f59e0b" opacity="0.9"/>
  </g>

  <!-- Coin element — top right corner, universal design -->
  <g filter="url(#coinGlow)" transform="translate(370, 115)">
    <circle cx="0" cy="0" r="42" fill="url(#coinGrad)"/>
    <circle cx="0" cy="0" r="33" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
    <!-- Inner concentric ring for coin authenticity -->
    <circle cx="0" cy="0" r="24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <!-- Coin shine highlight -->
    <ellipse cx="-12" cy="-14" rx="10" ry="16" fill="rgba(255,255,255,0.15)" transform="rotate(-30, -12, -14)"/>
    <!-- Three horizontal ridges — universal coin texture -->
    <line x1="-14" y1="-4" x2="14" y2="-4" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-16" y1="2" x2="16" y2="2" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-14" y1="8" x2="14" y2="8" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Small sparkle dots — activity feel -->
  <circle cx="340" cy="82" r="4" fill="#fcd34d" opacity="0.6"/>
  <circle cx="405" cy="95" r="3" fill="#f59e0b" opacity="0.5"/>
  <circle cx="320" cy="105" r="2.5" fill="#fbbf24" opacity="0.4"/>

  <!-- Subtle border ring -->
  <rect
    width="512" height="512" rx="115" ry="115"
    fill="none"
    stroke="rgba(255,255,255,0.08)"
    stroke-width="2"
  />
</svg>
